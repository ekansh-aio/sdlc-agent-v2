[theme]
base            = "dark"
primaryColor    = "#388bfd"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor       = "#f0f6fc"
font            = "sans serif"

[server]
runOnSave = false
headless  = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = false
